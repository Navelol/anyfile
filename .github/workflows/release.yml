name: Release

# Triggers on a version tag push: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'
  # Also allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  # ── Linux AppImage ───────────────────────────────────────────────────────────
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libassimp-dev \
            libarchive-dev \
            libmagic-dev \
            libheif-dev \
            libgl1-mesa-dev \
            fuse libfuse2 \
            curl

      - name: Install Qt 6.6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.*'
          host: linux
          target: desktop
          arch: gcc_64
          modules: 'qtquick3d'
          cache: true

      - name: Build AppImage
        run: |
          chmod +x scripts/build_appimage.sh
          bash scripts/build_appimage.sh
        env:
          # install-qt-action sets QT_ROOT_DIR; point qmake there for linuxdeploy-plugin-qt
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  # ── Windows ZIP ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-assimp
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-file
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-svg
            p7zip

      - name: Build
        run: |
          cmake -S . -B build/windows \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GUI=ON \
            -DBUILD_TESTS=OFF \
            -DQt6_DIR=/mingw64/lib/cmake/Qt6
          cmake --build build/windows --config Release

      - name: Deploy Qt DLLs
        run: |
          cd build/windows/bin
          windeployqt6 --no-translations --no-quick-import anyfile_gui.exe || \
          windeployqt  --no-translations --no-quick-import anyfile_gui.exe

      - name: Package ZIP
        run: |
          mkdir -p dist
          cd build/windows/bin
          7z a ../../../dist/Anyfile-windows-x86_64.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip
          if-no-files-found: error

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    # Only publish a release on a tag push (not manual triggers)
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-appimage/*.AppImage
            artifacts/windows-zip/*.zip
          generate_release_notes: true
