name: Release

# Triggers on a version tag push: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'
  # Also allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  # ── Linux AppImage ───────────────────────────────────────────────────────────
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libassimp-dev \
            libarchive-dev \
            libmagic-dev \
            libheif-dev \
            libgl1-mesa-dev \
            fuse libfuse2 \
            curl

      - name: Install Qt 6.6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.*'
          host: linux
          target: desktop
          arch: gcc_64
          modules: 'qtquick3d'
          cache: true

      - name: Build AppImage
        run: |
          chmod +x scripts/build_appimage.sh
          bash scripts/build_appimage.sh
        env:
          # install-qt-action sets QT_ROOT_DIR; point qmake there for linuxdeploy-plugin-qt
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  # ── Windows ZIP ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-assimp
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-file
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-svg
            p7zip

      - name: Build
        run: |
          cmake -S . -B build/windows \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GUI=ON \
            -DBUILD_TESTS=OFF \
            -DQt6_DIR=/mingw64/lib/cmake/Qt6
          cmake --build build/windows --config Release

      - name: Deploy Qt DLLs
        run: |
          cd build/windows/bin
          windeployqt6 --no-translations --no-quick-import anyfile_gui.exe || \
          windeployqt  --no-translations --no-quick-import anyfile_gui.exe

      - name: Download portable tools
        shell: pwsh
        run: |
          $ToolsDl = "tools_dl"
          New-Item -ItemType Directory -Path $ToolsDl -Force | Out-Null
          $MingwBin = "C:\msys64\mingw64\bin"

          # ── FFmpeg ── already installed via MSYS2 above
          Write-Host "Copying FFmpeg from MSYS2..."
          $FfmpegDir = Join-Path $ToolsDl "ffmpeg"
          New-Item -ItemType Directory -Path $FfmpegDir -Force | Out-Null
          foreach ($exe in @("ffmpeg.exe", "ffprobe.exe", "ffplay.exe")) {
              $src = Join-Path $MingwBin $exe
              if (Test-Path $src) { Copy-Item $src $FfmpegDir }
          }
          # Copy FFmpeg DLLs (avcodec, avformat, avutil, swscale, swresample, avdevice, avfilter, postproc)
          Get-ChildItem $MingwBin -Filter "av*.dll"    | Copy-Item -Destination $FfmpegDir
          Get-ChildItem $MingwBin -Filter "sw*.dll"    | Copy-Item -Destination $FfmpegDir
          Get-ChildItem $MingwBin -Filter "postproc*.dll" | Copy-Item -Destination $FfmpegDir

          # ── Pandoc ──────────────────────────────────────────────────────────
          Write-Host "Downloading Pandoc..."
          $PandocVer = "3.6.3"
          $PandocUrl = "https://github.com/jgm/pandoc/releases/download/$PandocVer/pandoc-$PandocVer-windows-x86_64.zip"
          Invoke-WebRequest $PandocUrl -OutFile "pandoc.zip" -UseBasicParsing
          Expand-Archive "pandoc.zip" -DestinationPath "pandoc_dl" -Force
          $PandocSrc = Get-ChildItem "pandoc_dl" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Path (Join-Path $ToolsDl "pandoc") -Force | Out-Null
          Copy-Item "$($PandocSrc.FullName)\*" (Join-Path $ToolsDl "pandoc") -Recurse

          # ── Poppler ─────────────────────────────────────────────────────────
          Write-Host "Downloading Poppler..."
          $PopplerUrl = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip"
          Invoke-WebRequest $PopplerUrl -OutFile "poppler.zip" -UseBasicParsing
          Expand-Archive "poppler.zip" -DestinationPath "poppler_dl" -Force
          $PopplerBin = Get-ChildItem "poppler_dl" -Filter "bin" -Recurse -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Path (Join-Path $ToolsDl "poppler\bin") -Force | Out-Null
          Copy-Item "$($PopplerBin.FullName)\*" (Join-Path $ToolsDl "poppler\bin")

          # ── Calibre ─────────────────────────────────────────────────────────
          Write-Host "Installing Calibre..."
          choco install calibre --no-progress -y | Out-Null
          $CalibreDir = "C:\Program Files\Calibre2"
          if (Test-Path $CalibreDir) {
              New-Item -ItemType Directory -Path (Join-Path $ToolsDl "calibre") -Force | Out-Null
              Copy-Item "$CalibreDir\*" (Join-Path $ToolsDl "calibre") -Recurse
              Write-Host "Calibre bundled."
          } else {
              Write-Warning "Calibre not found at $CalibreDir — skipped"
          }

          # ── LibreOffice ──────────────────────────────────────────────────────
          Write-Host "Installing LibreOffice..."
          choco install libreoffice --no-progress -y | Out-Null
          $LoProgram = "C:\Program Files\LibreOffice\program"
          if (Test-Path $LoProgram) {
              New-Item -ItemType Directory -Path (Join-Path $ToolsDl "libreoffice\program") -Force | Out-Null
              Copy-Item "$LoProgram\*" (Join-Path $ToolsDl "libreoffice\program") -Recurse
              Write-Host "LibreOffice bundled."
          } else {
              Write-Warning "LibreOffice not found at $LoProgram — skipped"
          }

      - name: Package
        shell: pwsh
        run: |
          $BinDir   = "build\windows\bin"
          $DistDir  = "build\windows\dist\everyfile"
          $MingwBin = "C:\msys64\mingw64\bin"

          # Recreate dist folder
          if (Test-Path $DistDir) { Remove-Item $DistDir -Recurse -Force }
          New-Item -ItemType Directory -Path $DistDir | Out-Null

          # Copy build output (exes, Qt DLLs, plugins, QML modules)
          Copy-Item "$BinDir\*" $DistDir -Recurse

          # Remove test binary
          $testExe = Join-Path $DistDir "anyfile_tests.exe"
          if (Test-Path $testExe) { Remove-Item $testExe }

          # MSYS2 runtime DLLs (same list as build_windows.ps1)
          $RuntimeDlls = @(
              "libgcc_s_seh-1.dll",
              "libstdc++-6.dll",
              "libwinpthread-1.dll",
              "libbz2-1.dll",
              "libzstd.dll",
              "liblzma-5.dll",
              "zlib1.dll",
              "libcrypto-3-x64.dll",
              "libiconv-2.dll",
              "libintl-8.dll",
              "libexpat-1.dll",
              "libtre-5.dll",
              "libsystre-0.dll",
              "libb2-1.dll",
              "liblz4.dll",
              "libminizip-1.dll",
              "libarchive-13.dll",
              "libassimp-6.dll",
              "libmagic-1.dll",
              "libpcre2-8-0.dll",
              "libpcre2-16-0.dll",
              "libdouble-conversion.dll",
              "libfreetype-6.dll",
              "libglib-2.0-0.dll",
              "libgraphite2.dll",
              "libharfbuzz-0.dll",
              "libicudt78.dll",
              "libicuin78.dll",
              "libicuuc78.dll",
              "libmd4c.dll",
              "libpng16-16.dll",
              "libbrotlicommon.dll",
              "libbrotlidec.dll"
          )

          Write-Host "Copying runtime DLLs..."
          $missing = @()
          foreach ($dll in $RuntimeDlls) {
              $src = Join-Path $MingwBin $dll
              if (Test-Path $src) {
                  Copy-Item $src $DistDir
              } else {
                  $missing += $dll
              }
          }
          if ($missing.Count -gt 0) {
              Write-Warning "DLLs not found (skipped): $($missing -join ', ')"
          }

          # magic.mgc
          $MagicMgc = "C:\msys64\mingw64\share\misc\magic.mgc"
          if (Test-Path $MagicMgc) {
              Copy-Item $MagicMgc $DistDir
          }

          # Bundle portable tools downloaded in the previous step
          $ToolsSrc = "tools_dl"
          $ToolsDir = Join-Path $DistDir "tools"
          if (Test-Path $ToolsSrc) {
              Write-Host "Bundling portable tools..."
              New-Item -ItemType Directory -Path $ToolsDir -Force | Out-Null
              Copy-Item "$ToolsSrc\*" $ToolsDir -Recurse
          }

          # Launcher batch file — adds tools subdirs to PATH so soffice/pandoc/etc are found
          $LauncherContent = @'
@echo off
set MAGIC=%~dp0magic.mgc
set PATH=%~dp0tools\ffmpeg;%~dp0tools\pandoc;%~dp0tools\poppler\bin;%~dp0tools\calibre;%~dp0tools\libreoffice\program;%PATH%
start "" "%~dp0anyfile_gui.exe" %*
'@
          Set-Content -Path (Join-Path $DistDir "everyfile.bat") -Value $LauncherContent -Encoding ASCII

          # Compress
          mkdir dist -Force | Out-Null
          7z a -tzip dist/Anyfile-windows-x86_64.zip $DistDir | Out-Null
          Write-Host "Package ready -> dist/Anyfile-windows-x86_64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip
          if-no-files-found: error

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    # Only publish a release on a tag push (not manual triggers)
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-appimage/*.AppImage
            artifacts/windows-zip/*.zip
          generate_release_notes: true
