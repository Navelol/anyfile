name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  # Uses a pre-built Docker image with Qt 6.6.3 and all deps baked in.
  # Image is built by .github/workflows/docker.yml — trigger that workflow
  # (or push a change to docker/linux-builder/Dockerfile) to rebuild it.
  build-linux:
    name: Linux (GCC)
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/navelol/everyfile-linux-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -S . -B build/linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GUI=ON \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build/linux --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build/linux --output-on-failure

      - name: GUI smoke test
        run: |
          QT_QPA_PLATFORM=offscreen ./build/linux/bin/anyfile_gui --smoke-test

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (Apple Clang)
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies via Homebrew
        run: |
          brew update
          brew bundle --file=Brewfile

      - name: Verify runtime tools
        run: |
          ffmpeg -version | head -1
          ffprobe -version | head -1
          pdftoppm -v 2>&1 | head -1 || true
          pandoc --version | head -1

      - name: Configure
        run: |
          cmake -S . -B build/macos \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GUI=ON \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build/macos --parallel $(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build/macos --output-on-failure

      - name: GUI smoke test
        run: |
          QT_QPA_PLATFORM=offscreen ./build/macos/bin/anyfile_gui.app/Contents/MacOS/anyfile_gui --smoke-test

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (MinGW64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-assimp
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-file
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-svg

      - name: Configure
        run: |
          cmake -S . -B build/windows \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GUI=ON \
            -DBUILD_TESTS=ON \
            -DQt6_DIR=/mingw64/lib/cmake/Qt6

      - name: Build
        run: cmake --build build/windows --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build/windows --output-on-failure

      - name: GUI smoke test
        run: |
          QT_QPA_PLATFORM=offscreen ./build/windows/bin/anyfile_gui.exe --smoke-test
